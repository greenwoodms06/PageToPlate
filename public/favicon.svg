     d="M 505.71779,160 H 208.34107 a 17.23923,17.361779 0 0 0 -17.23923,17.36178 v 683.62003 c 0,13.02133 10.77452,21.70222 23.70394,19.532 103.43538,-17.36178 204.71586,-19.532 290.91201,-15.19156 z"
     id="path8"
