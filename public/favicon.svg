  <path
     class="ink"
     d="M 509.83855,151.99949 H 201.31904 a 17.885189,17.722876 0 0 0 -17.88518,17.72289 v 697.8383 c 0,13.29214 11.17823,22.15359 24.59213,19.93823 107.31114,-17.72288 212.38662,-19.93823 301.81256,-15.50752 z"
     id="path9" />
  <!-- text lines -->
  <g
     class="rule"
     id="g12"
     transform="matrix(1.3667826,0,0,0.98387565,-172.51699,8.1105457)">
    <line
       x1="300"
       y1="404"
       x2="466"
       y2="404"
       id="line9" />
    <line
       x1="300"
       y1="470"
       x2="466"
       y2="470"
       id="line10" />
    <line
       x1="300"
       y1="536"
       x2="466"
       y2="536"
       id="line11" />
    <line
       x1="300"
       y1="602"
       x2="410"
       y2="602"
       id="line12" />
  </g>
  <!-- ============ CENTER LINE: shared edge where page meets plate ============ -->
  <path
     style="fill:#d4ff2a;stroke:#eba013;stroke-width:32;stroke-linecap:round;stroke-dasharray:none;stroke-opacity:1"
     d="M 242.49325,307.82822 H 368.13742"
     id="path13" />
</svg>
