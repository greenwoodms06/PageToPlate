<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- PageToPlate mark: an index card with a book-spine stripe, on paper.
       Colors are the light-theme tokens (tokens.css): paper #F6F4EC,
       card #FFFEF9, line #E2DFD2, ruling #E7E4D6, spine-1 #0072B2. -->
  <rect width="512" height="512" fill="#F6F4EC"/>
  <defs>
    <clipPath id="card"><rect x="76" y="124" width="360" height="264" rx="30"/></clipPath>
  </defs>
  <rect x="76" y="124" width="360" height="264" rx="30" fill="#FFFEF9" stroke="#E2DFD2" stroke-width="8"/>
  <g clip-path="url(#card)">
    <rect x="76" y="124" width="50" height="264" fill="#0072B2"/>
  </g>
  <g stroke="#E7E4D6" stroke-width="10" stroke-linecap="round">
    <line x1="160" y1="238" x2="404" y2="238"/>
    <line x1="160" y1="294" x2="404" y2="294"/>
    <line x1="160" y1="350" x2="372" y2="350"/>
  </g>
</svg>
